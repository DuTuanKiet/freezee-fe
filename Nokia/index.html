<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nokia</title>
  </head>
  <body>
    <img src="/Bai2/man-hinh-nokia-1200.jpg" alt="Nokia" />
    <h1>Điện thoại Nokia</h1>
    <p>Giá: 9.290.000đ</p>
    <p>Giảm ngay: 1.3 triệu (áp dụng cho đơn hàng đặt trước trong ngày 1/12)</p>
    <p>Phiểu mua hàng Samsung trị giá 150.000đ</p>
    <p><strong>Giảm 1.300.000đ còn 7.990.000đ</strong></p>
    <p>Màu: Đen</p>
    <div>
      <button>-</button>
      <input type="number" value="1" min="1" />
      <button>+</button>
    </div>
    <p>Tổng tiền: 9.290.000đ</p>
    <p>Giảm: -1.300.000đ</p>
    <p>
      Cần thanh toán: 7.990.000đ
      <span>(Sử dụng mã giảm giá)</span>
    </p>
    <div>
      <input type="radio" name="recipient" id="anh" checked />
      <label for="anh">Anh</label>
      <input type="radio" name="recipient" id="chi" />
      <label for="chi">Chị</label>
    </div>
    <div>
      <input type="text" placeholder="Họ và tên" required />
      <input type="text" placeholder="Số điện thoại" required />
    </div>
    <div>
      <input
        type="text"
        placeholder="Yêu cầu khác (khoảng cách buộc)"
        required
      />
    </div>
    <div>
      <input type="radio" name="delivery" id="delivery" checked />
      <label for="delivery">Địa chỉ giao hàng</label>
      <input type="radio" name="delivery" id="installment" />
      <label for="installment">Nhận tại siêu thị</label>
    </div>
    <input type="text" placeholder="Địa chỉ giao hàng/Nhận tại siêu thị" />
    <button>Thêm vào giỏ hàng</button>
    <button>Mua ngay</button>
  </body>
</html>
